name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # Skip the Electron binary download in CI (the desktop app isn't run here).
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Build packages + API (tsc)
        run: npm run build

      - name: Build desktop widget (electron-vite)
        run: npm run widget:build

      - name: Typecheck desktop widget (tsc --noEmit)
        run: npm run widget:typecheck

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check
