name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (esbuild)
        run: npm run build

      - name: Test
        run: npm test

      - name: Smoke test
        run: node scripts/smoke.mjs

      - name: Package (.vsix)
        run: npx --yes @vscode/vsce package --no-dependencies
